version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: chilinhm/my-bot:latest
    container_name: chilinhm-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Useful to avoid python buffering so logs appear immediately
      - PYTHONUNBUFFERED=1
    # Gem log-fil lokalt så du kan se bot.log fra host
    volumes:
      - ./bot.log:/app/bot.log
    # Begræns log-rotation for at undgå for store log-filer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
